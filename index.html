<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHANNEL 1 PRO - Premium Sports</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');
        body { background-color: #05080f; color: #f8fafc; font-family: 'Rajdhani', sans-serif; }
        .featured-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 1px solid #334155; }
        .match-row { background: #0f172a; border-left: 4px solid #3b82f6; transition: 0.3s; }
        .match-row:hover { background: #1e293b; transform: scale(1.01); }
        .live-tag { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        #player-modal { display: none; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); }
        .video-wrapper { position: relative; width: 95%; max-width: 1000px; aspect-ratio: 16/9; box-shadow: 0 0 50px rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="pb-20">

    <!-- Navbar -->
    <nav class="bg-slate-900/80 sticky top-0 z-40 border-b border-slate-800 backdrop-blur-md">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 style="font-family: 'Orbitron';" class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-cyan-400 uppercase tracking-tighter">
                Channel<span class="text-white">1</span>
            </h1>
            <div class="flex items-center gap-4">
                <span id="match-count" class="bg-blue-600/20 text-blue-400 px-3 py-1 rounded-full text-xs font-bold border border-blue-500/30">0 Matches</span>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 py-8">
        <!-- Section 1: Featured Matches -->
        <h2 class="text-xl font-bold mb-6 flex items-center gap-2 text-blue-400">
            <i class="fas fa-star"></i> TOP FIXTURES
        </h2>
        <div id="featured-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12"></div>

        <!-- Section 2: All Matches -->
        <h2 class="text-xl font-bold mb-6 flex items-center gap-2 text-blue-400">
            <i class="fas fa-list"></i> ALL MATCH SCHEDULE
        </h2>
        <div id="all-matches" class="space-y-3"></div>
    </div>

    <!-- Player Modal -->
    <div id="player-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="video-wrapper rounded-2xl overflow-hidden border border-slate-700">
            <button onclick="closePlayer()" class="absolute -top-12 right-0 text-white text-2xl hover:text-red-500 font-bold">
                <i class="fas fa-times"></i> CLOSE PLAYER
            </button>
            <div id="player-loader" class="absolute inset-0 bg-slate-900 flex flex-col items-center justify-center">
                <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                <p class="mt-4 text-slate-400">Cleaning up stream & loading...</p>
            </div>
            <iframe id="main-player" src="" allowfullscreen scrolling="no" class="w-full h-full"></iframe>
        </div>
    </div>

    <script>
        async function fetchContent() {
            try {
                const res = await fetch('matches.json');
                const matches = await res.json();
                
                const featuredContainer = document.getElementById('featured-list');
                const allContainer = document.getElementById('all-matches');
                document.getElementById('match-count').innerText = `${matches.length} Matches Found`;

                // Render Featured
                featuredContainer.innerHTML = matches.filter(m => m.is_featured).map(m => `
                    <div class="featured-card rounded-2xl p-6 text-center">
                        <p class="text-[10px] text-blue-400 font-bold mb-4 tracking-widest">${m.league}</p>
                        <div class="flex items-center justify-around mb-6">
                            <div class="w-1/3">
                                <img src="${m.home_logo}" class="w-14 h-14 mx-auto mb-2 object-contain" onerror="this.src='https://cdn-icons-png.flaticon.com/512/53/53254.png'">
                                <p class="text-xs font-bold truncate">${m.home_team}</p>
                            </div>
                            <div class="text-blue-500 font-black italic text-xl">VS</div>
                            <div class="w-1/3">
                                <img src="${m.away_logo}" class="w-14 h-14 mx-auto mb-2 object-contain" onerror="this.src='https://cdn-icons-png.flaticon.com/512/53/53254.png'">
                                <p class="text-xs font-bold truncate">${m.away_team}</p>
                            </div>
                        </div>
                        <p class="text-xs text-slate-400 mb-4">${m.time}</p>
                        <button onclick="watchStream('${m.link}')" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold text-sm transition">LIVE STREAM</button>
                    </div>
                `).join('');

                // Render All Matches List
                allContainer.innerHTML = matches.filter(m => !m.is_featured).map(m => `
                    <div class="match-row p-4 rounded-r-xl flex flex-wrap justify-between items-center gap-4">
                        <div class="flex-1 min-w-[200px]">
                            <span class="text-[9px] bg-slate-800 px-2 py-0.5 rounded text-slate-400 mr-2">${m.league}</span>
                            <span class="text-sm font-bold">${m.home_team} vs ${m.away_team}</span>
                        </div>
                        <div class="flex items-center gap-6">
                            <div class="text-center">
                                <span class="block text-[10px] text-slate-500">TIME</span>
                                <span class="text-sm font-mono text-blue-300">${m.time}</span>
                            </div>
                            <button onclick="watchStream('${m.link}')" class="bg-slate-800 hover:bg-blue-600 border border-slate-700 px-5 py-2 rounded-lg text-xs font-bold transition">WATCH</button>
                        </div>
                    </div>
                `).join('');

            } catch (e) { console.log(e); }
        }

        function watchStream(url) {
            const modal = document.getElementById('player-modal');
            const iframe = document.getElementById('main-player');
            const loader = document.getElementById('player-loader');
            
            loader.style.display = 'flex';
            modal.style.display = 'flex';
            iframe.src = url;

            iframe.onload = () => { loader.style.display = 'none'; };
        }

        function closePlayer() {
            document.getElementById('player-modal').style.display = 'none';
            document.getElementById('main-player').src = "";
        }

        fetchContent();
        setInterval(fetchContent, 60000);
    </script>
</body>
</html>
