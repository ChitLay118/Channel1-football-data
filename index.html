<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Live Football</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b0f1a; color: #e2e8f0; }
        .match-card { background: #161e2d; border: 1px solid #243049; transition: 0.3s; }
        .match-card:hover { border-color: #3b82f6; transform: translateY(-3px); }
    </style>
</head>
<body>
    <div class="max-w-4xl mx-auto px-4 py-8">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black text-blue-500 italic">SOCCER<span class="text-white">STREAM</span></h1>
            <p class="text-slate-400 mt-2">Live Football Links from Xscore808</p>
        </header>

        <div id="match-list" class="space-y-4">
            <!-- Matches go here -->
            <div class="text-center py-10"><i class="fas fa-circle-notch fa-spin text-2xl"></i></div>
        </div>
    </div>

    <script>
        async function loadMatches() {
            try {
                const res = await fetch('matches.json');
                const data = await res.json();
                const container = document.getElementById('match-list');

                if (data.length === 0) {
                    container.innerHTML = `<p class="text-center text-slate-500">No matches available right now.</p>`;
                    return;
                }

                container.innerHTML = data.map(m => `
                    <div class="match-card rounded-xl p-4 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div class="flex-1 text-center md:text-left">
                            <div class="text-[10px] text-blue-400 font-bold uppercase tracking-wider mb-1">${m.league}</div>
                            <div class="text-lg font-bold text-white">${m.title}</div>
                        </div>
                        <div class="flex items-center gap-6">
                            <div class="text-center">
                                <div class="text-xs text-slate-400">Time (GMT+0)</div>
                                <div class="font-mono text-blue-300">${m.time}</div>
                            </div>
                            <a href="${m.link}" target="_blank" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-lg font-bold text-sm transition shadow-lg shadow-blue-900/20">
                                WATCH
                            </a>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error(e);
            }
        }
        loadMatches();
    </script>
</body>
</html>
