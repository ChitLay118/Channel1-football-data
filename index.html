<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHANNEL 1 - LIVE FOOTBALL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #060914; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(22, 32, 54, 0.8); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.05); }
        .live-dot { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        #player-overlay { display: none; background: rgba(0,0,0,0.95); z-index: 1000; }
        .player-box { width: 95%; max-width: 1100px; aspect-ratio: 16/9; }
    </style>
</head>
<body class="pb-10">

    <!-- Navbar -->
    <nav class="glass sticky top-0 z-50 border-b border-slate-800 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="text-2xl font-black italic text-blue-500">CHANNEL<span class="text-white">1</span></div>
            <div id="update-time" class="text-[10px] text-slate-500 font-mono"></div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 mt-8">
        <!-- Live Featured Section -->
        <h2 class="text-xl font-bold mb-6 text-blue-400 flex items-center"><i class="fas fa-bolt mr-2"></i> FEATURED MATCHES</h2>
        <div id="featured-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12"></div>

        <!-- All Matches List -->
        <h2 class="text-xl font-bold mb-6 text-slate-400 flex items-center"><i class="fas fa-list mr-2"></i> ALL FIXTURES</h2>
        <div id="matches-list" class="space-y-3"></div>
    </div>

    <!-- Player Modal -->
    <div id="player-overlay" class="fixed inset-0 flex items-center justify-center p-4">
        <div class="player-box relative bg-black rounded-3xl overflow-hidden border border-slate-700">
            <button onclick="closeStream()" class="absolute top-4 right-4 bg-red-600 hover:bg-red-700 text-white w-10 h-10 rounded-full z-50 transition">
                <i class="fas fa-times"></i>
            </button>
            <div id="stream-loader" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900 z-40">
                <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                <p class="mt-4 text-sm text-slate-400 uppercase tracking-widest">Ad-Blocking Player Starting...</p>
            </div>
            <iframe id="main-iframe" src="" allowfullscreen frameborder="0" class="w-full h-full"></iframe>
        </div>
    </div>

    <script>
        async function fetchMatches() {
            try {
                const res = await fetch('matches.json');
                const data = await res.json();
                
                const featuredGrid = document.getElementById('featured-grid');
                const matchesList = document.getElementById('matches-list');
                document.getElementById('update-time').innerText = "UPDATED: " + new Date().toLocaleTimeString();

                // Featured Matches
                featuredGrid.innerHTML = data.filter(m => m.type === 'featured').map(m => `
                    <div class="glass rounded-3xl p-6 transition hover:border-blue-500/50">
                        <div class="flex justify-between text-[10px] font-bold text-blue-400 mb-6 uppercase tracking-wider">
                            <span>${m.league}</span>
                            <span class="text-red-500 flex items-center"><span class="h-1.5 w-1.5 bg-red-500 rounded-full mr-1.5 live-dot"></span> LIVE</span>
                        </div>
                        <div class="flex items-center justify-between mb-8 gap-4">
                            <div class="text-center w-1/3">
                                <img src="${m.home_logo}" class="w-12 h-12 mx-auto mb-2 object-contain" onerror="this.src='https://cdn-icons-png.flaticon.com/512/53/53254.png'">
                                <div class="text-xs font-bold truncate">${m.home_team}</div>
                            </div>
                            <div class="text-xl font-black italic text-slate-600">VS</div>
                            <div class="text-center w-1/3">
                                <img src="${m.away_logo}" class="w-12 h-12 mx-auto mb-2 object-contain" onerror="this.src='https://cdn-icons-png.flaticon.com/512/53/53254.png'">
                                <div class="text-xs font-bold truncate">${m.away_team}</div>
                            </div>
                        </div>
                        <button onclick="openStream('${m.link}')" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-2xl font-bold text-sm transition">WATCH STREAM</button>
                    </div>
                `).join('');

                // All Match List
                matchesList.innerHTML = data.filter(m => m.type === 'list').map(m => `
                    <div class="glass rounded-2xl p-4 flex flex-wrap justify-between items-center gap-4 hover:bg-slate-800/50 transition">
                        <div class="flex-1 min-w-[250px]">
                            <span class="text-[9px] bg-slate-700 px-2 py-0.5 rounded text-slate-400 mr-2 uppercase">${m.league}</span>
                            <span class="font-bold text-sm">${m.title}</span>
                        </div>
                        <div class="flex items-center gap-8">
                            <span class="text-xs font-mono text-blue-300">${m.time}</span>
                            <button onclick="openStream('${m.link}')" class="bg-slate-700 hover:bg-blue-600 px-6 py-2 rounded-xl text-xs font-bold transition">WATCH</button>
                        </div>
                    </div>
                `).join('');

            } catch (e) { console.error(e); }
        }

        function openStream(url) {
            const overlay = document.getElementById('player-overlay');
            const iframe = document.getElementById('main-iframe');
            const loader = document.getElementById('stream-loader');
            
            loader.style.display = 'flex';
            overlay.style.display = 'flex';
            iframe.src = url;

            iframe.onload = () => { loader.style.display = 'none'; };
        }

        function closeStream() {
            document.getElementById('player-overlay').style.display = 'none';
            document.getElementById('main-player').src = "";
        }

        fetchMatches();
        setInterval(fetchMatches, 60000);
    </script>
</body>
</html>
