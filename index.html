<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHANNEL 1 - LIVE FOOTBALL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #060914; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(22, 32, 54, 0.8); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.05); }
        .live-dot { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        #player-overlay { display: none; background: rgba(0,0,0,0.95); z-index: 1000; }
        .player-box { width: 95%; max-width: 1100px; aspect-ratio: 16/9; }
    </style>
</head>
<body class="pb-10">

    <!-- Navbar -->
    <nav class="glass sticky top-0 z-50 border-b border-slate-800 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="text-2xl font-black italic text-blue-500 tracking-tighter">CHANNEL<span class="text-white">1</span></div>
            <div id="update-time" class="text-[10px] text-slate-500 font-mono tracking-widest uppercase"></div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 mt-8">
        <!-- Live Featured Section (Only if logos exist) -->
        <div id="featured-section" style="display:none;">
            <h2 class="text-xl font-bold mb-6 text-blue-400 flex items-center tracking-tight"><i class="fas fa-bolt mr-2"></i> TOP FIXTURES</h2>
            <div id="featured-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12"></div>
        </div>

        <!-- All Matches List -->
        <h2 class="text-xl font-bold mb-6 text-slate-400 flex items-center tracking-tight"><i class="fas fa-list mr-2"></i> LIVE SCHEDULE</h2>
        <div id="matches-list" class="space-y-3">
            <!-- Loading message -->
            <div id="loading" class="text-center py-20 text-slate-600 italic">Connecting to match server...</div>
        </div>
    </div>

    <!-- Player Modal -->
    <div id="player-overlay" class="fixed inset-0 flex items-center justify-center p-4">
        <div class="player-box relative bg-black rounded-3xl overflow-hidden border border-slate-700 shadow-2xl">
            <button onclick="closeStream()" class="absolute top-4 right-4 bg-red-600 hover:bg-red-700 text-white w-10 h-10 rounded-full z-50 transition flex items-center justify-center">
                <i class="fas fa-times text-lg"></i>
            </button>
            <div id="stream-loader" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900 z-40">
                <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                <p class="mt-4 text-[10px] text-slate-500 uppercase tracking-[0.2em] font-bold">Syncing Live Stream...</p>
            </div>
            <iframe id="main-iframe" src="" allowfullscreen frameborder="0" class="w-full h-full"></iframe>
        </div>
    </div>

    <script>
        async function fetchMatches() {
            try {
                // cache မဖြစ်အောင် timestamp ထည့်ထားပါတယ်
                const res = await fetch('matches.json?t=' + new Date().getTime());
                const data = await res.json();
                
                const featuredSection = document.getElementById('featured-section');
                const featuredGrid = document.getElementById('featured-grid');
                const matchesList = document.getElementById('matches-list');
                const updateTime = document.getElementById('update-time');
                
                updateTime.innerText = "LAST UPDATE: " + new Date().toLocaleTimeString();

                if (!data || data.length === 0) {
                    matchesList.innerHTML = `<div class="text-center py-20 text-slate-600">No matches found. Check back later.</div>`;
                    return;
                }

                // Featured Matches (သူတို့မှာ home_logo ပါမှ ပြမယ်)
                const featuredMatches = data.filter(m => m.home_logo && m.home_logo !== "");
                if (featuredMatches.length > 0) {
                    featuredSection.style.display = 'block';
                    featuredGrid.innerHTML = featuredMatches.map(m => `
                        <div class="glass rounded-3xl p-6 transition hover:border-blue-500/50">
                            <div class="flex justify-between text-[10px] font-bold text-blue-400 mb-6 uppercase tracking-wider">
                                <span>${m.league}</span>
                                <span class="text-red-500 flex items-center"><span class="h-1.5 w-1.5 bg-red-500 rounded-full mr-1.5 live-dot"></span> LIVE</span>
                            </div>
                            <div class="flex items-center justify-between mb-8 gap-4">
                                <div class="text-center w-1/3">
                                    <img src="${m.home_logo}" class="w-12 h-12 mx-auto mb-2 object-contain" onerror="this.src='https://cdn-icons-png.flaticon.com/512/53/53254.png'">
                                    <div class="text-[11px] font-bold truncate uppercase">${m.home_team || m.title.split(' vs ')[0]}</div>
                                </div>
                                <div class="text-xl font-black italic text-slate-700">VS</div>
                                <div class="text-center w-1/3">
                                    <img src="${m.away_logo}" class="w-12 h-12 mx-auto mb-2 object-contain" onerror="this.src='https://cdn-icons-png.flaticon.com/512/53/53254.png'">
                                    <div class="text-[11px] font-bold truncate uppercase">${m.away_team || m.title.split(' vs ')[1]}</div>
                                </div>
                            </div>
                            <button onclick="openStream('${m.link}')" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-2xl font-bold text-xs tracking-widest transition uppercase">WATCH LIVE</button>
                        </div>
                    `).join('');
                }

                // All Match List (အကုန်လုံးကို ပြမယ်)
                matchesList.innerHTML = data.map(m => `
                    <div class="glass rounded-2xl p-4 flex flex-wrap justify-between items-center gap-4 hover:bg-slate-800/40 transition border-l-4 ${m.is_live ? 'border-l-blue-600' : 'border-l-slate-700'}">
                        <div class="flex-1 min-w-[200px]">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-[9px] bg-slate-700 px-2 py-0.5 rounded text-slate-300 font-bold uppercase tracking-tighter">${m.league}</span>
                                ${m.is_live ? '<span class="text-[9px] text-red-500 font-bold uppercase animate-pulse">● LIVE</span>' : ''}
                            </div>
                            <span class="font-bold text-sm tracking-tight">${m.title}</span>
                        </div>
                        <div class="flex items-center gap-6">
                            <span class="text-xs font-mono text-slate-500">${m.time}</span>
                            <button onclick="openStream('${m.link}')" class="bg-slate-800 hover:bg-blue-600 border border-slate-700 px-6 py-2 rounded-xl text-[10px] font-black transition uppercase tracking-widest">STREAM</button>
                        </div>
                    </div>
                `).join('');

            } catch (e) { 
                console.error(e);
                document.getElementById('matches-list').innerHTML = `<div class="text-center py-20 text-red-400">Error loading matches.json</div>`;
            }
        }

        function openStream(url) {
            const overlay = document.getElementById('player-overlay');
            const iframe = document.getElementById('main-iframe');
            const loader = document.getElementById('stream-loader');
            
            loader.style.display = 'flex';
            overlay.style.display = 'flex';
            iframe.src = url;

            iframe.onload = () => { loader.style.display = 'none'; };
        }

        function closeStream() {
            document.getElementById('player-overlay').style.display = 'none';
            document.getElementById('main-iframe').src = ""; // ID မှန်အောင် ပြင်ထားပါတယ်
        }

        fetchMatches();
        setInterval(fetchMatches, 60000); // 1 min update
    </script>
</body>
</html>
