<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Channel 1 - Live Sports</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b1120; color: #e2e8f0; font-family: sans-serif; }
        .match-card { background: #1e293b; border: 1px solid #334155; transition: 0.2s; }
        .match-card:hover { border-color: #3b82f6; }
        
        /* Modal Style */
        #player-modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.9); }
        .iframe-container { position: relative; width: 100%; max-width: 900px; aspect-ratio: 16/9; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="max-w-4xl mx-auto px-4 py-8">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-black text-blue-500 tracking-tighter">CHANNEL<span class="text-white">1</span></h1>
            <div id="status" class="text-xs text-slate-500 font-mono"></div>
        </header>

        <div id="match-list" class="grid gap-4">
            <!-- Matches will be loaded here -->
            <p class="text-center text-slate-500">Loading live matches...</p>
        </div>
    </div>

    <!-- Video Player Modal -->
    <div id="player-modal" class="flex items-center justify-center p-4">
        <div class="iframe-container rounded-lg overflow-hidden shadow-2xl relative">
            <!-- Close Button -->
            <button onclick="closePlayer()" class="absolute -top-10 right-0 text-white text-xl hover:text-red-500 transition">
                <i class="fas fa-times mr-1"></i> Close
            </button>
            
            <!-- Loading Spinner inside iframe -->
            <div id="loader" class="absolute inset-0 flex items-center justify-center bg-black">
                <i class="fas fa-circle-notch fa-spin text-3xl text-blue-500"></i>
            </div>

            <iframe id="video-iframe" src="" allowfullscreen scrolling="no"></iframe>
        </div>
    </div>

    <script>
        async function loadMatches() {
            try {
                const res = await fetch('matches.json');
                const data = await res.json();
                const container = document.getElementById('match-list');
                const status = document.getElementById('status');

                status.innerText = "LAST UPDATED: " + new Date().toLocaleTimeString();

                if (!data || data.length === 0) {
                    container.innerHTML = `<div class="text-center py-20 text-slate-600 border-2 border-dashed border-slate-800 rounded-xl">No live matches at the moment.</div>`;
                    return;
                }

                container.innerHTML = data.map(m => `
                    <div class="match-card rounded-xl p-4 flex justify-between items-center group">
                        <div class="flex-1">
                            <div class="text-[10px] text-blue-400 font-bold mb-1 uppercase tracking-widest">${m.league}</div>
                            <div class="text-lg font-bold text-white group-hover:text-blue-400 transition-colors">${m.title}</div>
                            <div class="text-xs text-slate-500 mt-1"><i class="far fa-clock mr-1"></i> ${m.time}</div>
                        </div>
                        <button onclick="openPlayer('${m.link}')" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-lg font-bold text-sm shadow-lg shadow-blue-900/40 active:scale-95 transition">
                            WATCH LIVE
                        </button>
                    </div>
                `).join('');
            } catch (e) {
                console.error("Fetch Error:", e);
            }
        }

        function openPlayer(url) {
            const modal = document.getElementById('player-modal');
            const iframe = document.getElementById('video-iframe');
            const loader = document.getElementById('loader');

            loader.style.display = 'flex'; // Spinner ပြမယ်
            iframe.src = url; // Iframe ထဲကို link ထည့်မယ်
            modal.style.display = 'flex'; // Modal ကို ပြမယ်
            
            // Iframe load ဖြစ်သွားရင် spinner ဖျောက်မယ်
            iframe.onload = function() {
                loader.style.display = 'none';
            };
        }

        function closePlayer() {
            const modal = document.getElementById('player-modal');
            const iframe = document.getElementById('video-iframe');
            
            modal.style.display = 'none'; // Modal ဖျောက်မယ်
            iframe.src = ""; // Video ရပ်သွားအောင် src ကို ဖြတ်လိုက်မယ်
        }

        // Escape key နဲ့ modal ပိတ်လို့ရအောင်
        window.addEventListener('keydown', (e) => {
            if (e.key === "Escape") closePlayer();
        });

        loadMatches();
        setInterval(loadMatches, 60000); // 1 မိနစ်တစ်ခါ data အသစ်စစ်မယ်
    </script>
</body>
</html>
